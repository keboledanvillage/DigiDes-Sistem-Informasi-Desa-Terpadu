<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiDes-Sistem Informasi Desa Terpadu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        theme: 'var(--theme-color)',
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Force Arial font across the entire application as requested */
        * {
            font-family: Arial, Helvetica, sans-serif !important;
        }

        :root {
            --theme-color: #2563eb; /* Default blue */
        }
        .style-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .style-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .style-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        .dark .style-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }
        
        @media print {
            body * { visibility: hidden; }
            #printable-area, #printable-area * { visibility: visible; }
            #printable-area { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                padding: 0; 
                color: #000 !important;
                background-color: #fff !important;
            }
            .print-hide { display: none !important; }
            @page { size: A4; margin: 15mm; }
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Custom Background Overlay for Login */
        .login-overlay {
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://script.google.com/macros/s/AKfycbz_fb-ecXO_fa6kzvZk6J9hKZfJ4mMAmP6TFzBRO5OXY9lVKeO1lGSFkZf-iI-Z6pHh/exec"></script>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const USERS = [
            { username: 'kades', password: 'sairun123', name: 'SAIRUN', role: 'KADES' },
            { username: 'sekdes', password: 'masharudin123', name: 'MASHARUDIN', role: 'SEKDES' },
            { username: 'kasi_kesejahteraan', password: 'soidin123', name: 'SOIDIN', role: 'KASI KESEJAHTERAAN' },
            { username: 'kasi_pelayanan', password: 'salafudin123', name: 'SALAFUDIN', role: 'KASI PELAYANAN (Lebe)' },
            { username: 'kaur_pemerintahan', password: 'aminah123', name: 'AMINAH', role: 'KASI PEMERINTAHAN' },
            { username: 'kaur_perencanaan', password: 'masrukhi123', name: 'MASRUKHI', role: 'KAUR PERENCANAAN' },
            { username: 'kaur_tu', password: 'lukman123', name: 'LUKMAN', role: 'KAUR TU & UMUM' },
            { username: 'kaur_keuangan', password: 'nuryanto123', name: 'NURYANTO', role: 'KAUR KEUANGAN' },
            { username: 'kadus_1', password: 'danton123', name: 'DANTON', role: 'KADUS I' },
            { username: 'lebe_2', password: 'lutfi123', name: 'LUTFI', role: 'KADUS II (Lebe)' }
        ];

        const JENIS_SURAT = [
            "Surat Keterangan Domisili", 
            "Surat Keterangan SKCK", 
            "Surat Keterangan Tidak Mampu",
            "Surat Keterangan Jalan", 
            "Surat Keterangan Usaha", 
            "Surat Keterangan Usaha Pertanian", // Added new agricultural certificate
            "Surat Keterangan Belum Menikah", 
            "Surat Keterangan Ijin Keramaian", 
            "Surat Keterangan Kelahiran", 
            "Surat Keterangan Kematian", 
            "Surat Pengantar Ijin Pemasangan Listrik", 
            "Surat Keterangan Ijin Bangunan",
            "Surat Keterangan Umum", 
            "Surat Kuasa", // Enhanced power of attorney
            "Surat Kuasa Umum", 
            "Surat Perjanjian Jual Beli", 
            "Surat Keterangan Hutang Piutang",
            "Surat Ijin Suami/Istri", 
            "Surat Keterangan ( Custom )"
        ];

        const DUMMY_PENDUDUK = [
            { id: 1, nik: "3329082607770006", nama: "ABDUL KHOLIK", jk: "Laki-laki", ttl: "BREBES, 26/07/1977", alamat: "RT 003 RW 002, Desa Keboledan", agama: "Islam", pekerjaan: "Wiraswasta" },
            { id: 2, nik: "3329082705060004", nama: "MUAMAR", jk: "Laki-laki", ttl: "BREBES, 27/05/2006", alamat: "RT 004 RW 002, Desa Keboledan", agama: "Islam", pekerjaan: "Pelajar/Mahasiswa" },
            { id: 3, nik: "3329080406860009", nama: "SIROJUDIN", jk: "Laki-laki", ttl: "BREBES, 04/06/1986", alamat: "RT 001 RW 001, Desa Keboledan", agama: "Islam", pekerjaan: "Petani/Wiraswasta" },
            { id: 4, nik: "3329085206920012", nama: "NUR FITRIA", jk: "Perempuan", ttl: "BREBES, 12/06/1992", alamat: "RT 001 RW 001, Desa Keboledan", agama: "Islam", pekerjaan: "Mengurus Rumah Tangga" },
            { id: 5, nik: "3329084107370064", nama: "TARKIMAH", jk: "Perempuan", ttl: "BREBES, 01/07/1937", alamat: "RT 002 RW 001, Desa Keboledan", agama: "Islam", pekerjaan: "Mengurus Rumah Tangga" }
        ];

        function Icon({ name, size = 16, className = "" }) {
            const iconMap = {
                User: "fas fa-user", Lock: "fas fa-lock", LayoutDashboard: "fas fa-chart-pie",
                FileText: "fas fa-file-alt", Users: "fas fa-users", FolderOpen: "fas fa-folder-open",
                LogOut: "fas fa-sign-out-alt", Moon: "fas fa-moon", Sun: "fas fa-sun",
                Printer: "fas fa-print", Search: "fas fa-search", Plus: "fas fa-plus",
                Save: "fas fa-save", X: "fas fa-times", Palette: "fas fa-palette",
                Trash2: "fas fa-trash-alt", Landmark: "fas fa-landmark", Building: "fas fa-building",
                MapIcon: "fas fa-map", Map: "fas fa-map-marked-alt", Upload: "fas fa-upload",
                Eye: "fas fa-eye", ImageIcon: "fas fa-image", FileIcon: "fas fa-file",
                Edit3: "fas fa-edit", PlusCircle: "fas fa-plus-circle", Briefcase: "fas fa-briefcase",
                Clipboard: "fas fa-clipboard", Heart: "fas fa-heart", FileSignature: "fas fa-file-signature",
                TrendingUp: "fas fa-chart-line", Archive: "fas fa-archive", Wallet: "fas fa-wallet",
                Download: "fas fa-download", Calendar: "fas fa-calendar", FileWord: "fas fa-file-word",
                FileExcel: "fas fa-file-excel", FilePdf: "fas fa-file-pdf", Edit: "fas fa-pen"
            };
            return <i className={`${iconMap[name] || "fas fa-circle"} ${className}`} style={{ fontSize: size }}></i>;
        }

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [themeMode, setThemeMode] = useState('light');
            const [themeColor, setThemeColor] = useState('#2563eb'); 
            
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');

            const [activeTab, setActiveTab] = useState('dashboard');
            const [penduduk, setPenduduk] = useState(DUMMY_PENDUDUK);
            
            const [dokumen, setDokumen] = useState([]);
            const [documentToEdit, setDocumentToEdit] = useState(null);
            const [notification, setNotification] = useState('');
            
            const [uploadedFiles, setUploadedFiles] = useState([]);

            // Workspace Custom Documents State (for Kades, Sekdes, etc. to create editable documents)
            const [workspaceDocs, setWorkspaceDocs] = useState([
                { id: 1, role: 'KADES', title: 'Keputusan Kepala Desa No. 12 Tahun 2026', content: 'Menimbang bahwa dalam rangka meningkatkan pelayanan administrasi kependudukan di Desa Keboledan, dirasa perlu menerapkan sistem digitalisasi data secara terpadu.\n\nMemutuskan:\n1. Menetapkan sistem DigiDes sebagai gerbang pelayanan utama.\n2. Menginstruksikan seluruh jajaran perangkat untuk mengoperasikan perangkat kerja masing-masing.', date: '12 Juli 2026' },
                { id: 2, role: 'SEKDES', title: 'Laporan Evaluasi Pelayanan Semester I', content: 'Pelayanan administrasi surat-menyurat di Desa Keboledan telah mengalami peningkatan efisiensi sebesar 45% setelah uji coba aplikasi mandiri.\n\nRencana Tindak Lanjut:\n- Sosialisasi penggunaan form cetak terstruktur bagi warga luar daerah.\n- Pembelian inventaris printer baru untuk memperlancar pelayanan fisik.', date: '12 Juli 2026' }
            ]);

            useEffect(() => {
                if (themeMode === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                document.documentElement.style.setProperty('--theme-color', themeColor);
            }, [themeMode, themeColor]);

            const showToast = (message) => {
                setNotification(message);
                setTimeout(() => setNotification(''), 3500);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const user = USERS.find(u => u.username === loginData.username && u.password === loginData.password);
                if (user) {
                    setCurrentUser(user);
                    setLoginError('');
                    showToast('Selamat Datang di DigiDes!');
                } else {
                    setLoginError('Username atau Password salah!');
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setActiveTab('dashboard');
                setLoginData({username: '', password: ''});
            };

            const getPageTitle = () => {
                switch(activeTab) {
                    case 'dashboard': return 'Dashboard Utama';
                    case 'penduduk': return 'Manajemen Data Penduduk';
                    case 'dokumen': return 'Dokumen Arsip Desa';
                    case 'kades': return 'Ruang Kerja KADES';
                    case 'sekdes': return 'Ruang Kerja SEKDES';
                    case 'kesejahteraan': return 'Ruang Kerja KASI KESEJAHTERAAN';
                    case 'pelayanan': return documentToEdit ? 'Edit Dokumen Surat' : 'Layanan Surat (KASI PELAYANAN)';
                    case 'pemerintahan': return 'Layanan PERTANAHAN & Pemerintahan';
                    case 'perencanaan': return 'Ruang Kerja KAUR PERENCANAAN';
                    case 'tu_umum': return 'Ruang Kerja KAUR TU & UMUM';
                    case 'keuangan': return 'Ruang Kerja KAUR KEUANGAN';
                    case 'kadus_1': return 'Ruang Kerja KADUS I';
                    case 'kadus_2': return 'Ruang Kerja KADUS II';
                    default: return 'Aplikasi DigiDes';
                }
            };

            if (!currentUser) {
                return (
                    <div 
                        className="min-h-screen flex items-center justify-center relative overflow-hidden bg-gray-900"
                        style={{ 
                            backgroundImage: "url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1200')", 
                            backgroundSize: 'cover', 
                            backgroundPosition: 'center',
                            backgroundRepeat: 'no-repeat'
                        }}
                    >
                        <div className="absolute inset-0 login-overlay"></div>
                        
                        <div className="bg-white/95 dark:bg-gray-800/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md z-10 border border-gray-200/50 dark:border-gray-700/50 mx-4 animate-fade-in">
                            <div className="text-center mb-6">
                                <h1 className="text-4xl font-black mb-2 tracking-tight" style={{ color: 'var(--theme-color)' }}>DigiDes</h1>
                                <p className="text-gray-600 dark:text-gray-300 font-medium">Sistem Informasi Desa Keboledan</p>
                            </div>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Username</label>
                                    <div className="relative">
                                        <div className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"><Icon name="User" /></div>
                                        <input 
                                            type="text" 
                                            className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:outline-none focus:border-transparent transition-all"
                                            style={{ '--tw-ring-color': 'var(--theme-color)' }}
                                            value={loginData.username}
                                            onChange={(e) => setLoginData({...loginData, username: e.target.value})}
                                            required placeholder="Masukkan username"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Password</label>
                                    <div className="relative">
                                        <div className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"><Icon name="Lock" /></div>
                                        <input 
                                            type="password" 
                                            className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:outline-none focus:border-transparent transition-all"
                                            style={{ '--tw-ring-color': 'var(--theme-color)' }}
                                            value={loginData.password}
                                            onChange={(e) => setLoginData({...loginData, password: e.target.value})}
                                            required placeholder="Masukkan password"
                                        />
                                    </div>
                                </div>
                                {loginError && <p className="text-red-500 text-sm text-center font-bold bg-red-50 dark:bg-red-900/20 p-2 rounded">{loginError}</p>}
                                <button type="submit" className="w-full py-2.5 mt-2 rounded-xl text-white font-black shadow-lg transition-transform transform hover:scale-105" style={{ backgroundColor: 'var(--theme-color)' }}>
                                    Masuk Sistem
                                </button>
                            </form>

                            <div className="mt-6 pt-4 border-t border-gray-200 dark:border-gray-700 text-xs text-center text-gray-500 dark:text-gray-400">
                                Gunakan kredensial uji coba: <br/>
                                <span className="inline-block mt-2 font-mono bg-gray-100 dark:bg-gray-900 p-2 rounded text-left">
                                    <strong>U:</strong> kades &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; | <strong>P:</strong> sairun123 <br/>
                                    <strong>U:</strong> kasi_pelayanan | <strong>P:</strong> salafudin123 <br/>
                                    <strong>U:</strong> kaur_pemerintahan| <strong>P:</strong> aminah123
                                </span>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 flex transition-colors duration-300 print:bg-white print:text-black">
                    {/* Notification Toast */}
                    {notification && (
                        <div className="fixed bottom-5 right-5 bg-gray-900 text-white dark:bg-white dark:text-gray-900 px-6 py-3 rounded-xl shadow-2xl z-50 flex items-center font-semibold border border-gray-700 dark:border-gray-200 animate-bounce">

                    )}

                    {/* Sidebar */}
                    <aside className="w-64 bg-white dark:bg-gray-800 shadow-xl flex flex-col print:hidden transition-colors duration-300 z-20 flex-shrink-0 h-screen">
                        <div className="p-6 flex flex-col items-center border-b border-gray-200 dark:border-gray-700">
                            <h2 className="text-2xl font-black mt-2 tracking-wide text-[var(--theme-color)]">DigiDes</h2>
                            <p className="text-xs text-gray-500 dark:text-gray-400 text-center font-bold mt-1">Desa Keboledan<br/>Kecamatan Wanasari</p>
                        </div>
                        
                        <div className="p-4 flex-1 overflow-y-auto style-scrollbar font-sans">
                            <p className="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wider">Navigasi Utama</p>
                            <nav className="space-y-1 mb-6">
                                <MenuButton icon="LayoutDashboard" label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                                <MenuButton icon="Users" label="Data Penduduk" active={activeTab === 'penduduk'} onClick={() => setActiveTab('penduduk')} />
                                <MenuButton icon="FolderOpen" label="Dokumen Arsip" active={activeTab === 'dokumen'} onClick={() => setActiveTab('dokumen')} />
                            </nav>

                            <p className="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wider">Layanan Utama</p>
                            <nav className="space-y-1 mb-6">
                                <MenuButton icon="FileSignature" label="KASI PELAYANAN (Surat)" active={activeTab === 'pelayanan'} onClick={() => { setDocumentToEdit(null); setActiveTab('pelayanan'); }} />
                                <MenuButton icon="Map" label="PERTANAHAN (Kasi Pem)" active={activeTab === 'pemerintahan'} onClick={() => { setDocumentToEdit(null); setActiveTab('pemerintahan'); }} />
                            </nav>

                            <p className="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wider">Ruang Kerja Perangkat</p>

                                <MenuButton icon="Clipboard" label="SEKDES" active={activeTab === 'sekdes'} onClick={() => setActiveTab('sekdes')} />
                                <MenuButton icon="Heart" label="KASI KESEJAHTERAAN" active={activeTab === 'kesejahteraan'} onClick={() => setActiveTab('kesejahteraan')} />
                                <MenuButton icon="TrendingUp" label="KAUR PERENCANAAN" active={activeTab === 'perencanaan'} onClick={() => setActiveTab('perencanaan')} />
                                <MenuButton icon="Archive" label="KAUR TU & UMUM" active={activeTab === 'tu_umum'} onClick={() => setActiveTab('tu_umum')} />
                                <MenuButton icon="Wallet" label="KAUR KEUANGAN" active={activeTab === 'keuangan'} onClick={() => setActiveTab('keuangan')} />
                                <MenuButton icon="MapIcon" label="KADUS I" active={activeTab === 'kadus_1'} onClick={() => setActiveTab('kadus_1')} />
                                <MenuButton icon="MapIcon" label="KADUS II" active={activeTab === 'kadus_2'} onClick={() => setActiveTab('kadus_2')} />
                            </nav>
                        </div>

                        <div className="p-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">

                                <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold" style={{ backgroundColor: 'var(--theme-color)' }}>

                                <div className="ml-3 overflow-hidden">
                                    <p className="text-sm font-bold truncate">{currentUser.name}</p>
                                    <p className="text-xs text-gray-500 truncate">{currentUser.role}</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="flex items-center justify-center bg-red-50 hover:bg-red-100 text-red-600 dark:bg-red-900/20 dark:hover:bg-red-900/40 p-2 rounded-lg text-sm font-semibold w-full transition-colors">

                            </button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden print:h-auto print:overflow-visible relative">
                        <header className="h-16 bg-white dark:bg-gray-800 shadow-sm flex items-center justify-between px-8 print:hidden transition-colors duration-300 z-10 flex-shrink-0">
                            <h1 className="text-xl font-bold text-gray-800 dark:text-white">
                                {getPageTitle()}
                            </h1>
                            
                            <div className="flex items-center space-x-4">
                                <div className="flex items-center space-x-2 border-r border-gray-200 dark:border-gray-700 pr-4">
                                    <Icon name="Palette" size={18} className="text-gray-500" />
                                    <button onClick={() => setThemeColor('#2563eb')} className={`w-6 h-6 rounded-full bg-blue-600 border-2 ${themeColor === '#2563eb' ? 'border-gray-800 dark:border-white' : 'border-transparent'}`}></button>
                                    <button onClick={() => setThemeColor('#16a34a')} className={`w-6 h-6 rounded-full bg-green-600 border-2 ${themeColor === '#16a34a' ? 'border-gray-800 dark:border-white' : 'border-transparent'}`}></button>
                                    <button onClick={() => setThemeColor('#dc2626')} className={`w-6 h-6 rounded-full bg-red-600 border-2 ${themeColor === '#dc2626' ? 'border-gray-800 dark:border-white' : 'border-transparent'}`}></button>
                                    <button onClick={() => setThemeColor('#d97706')} className={`w-6 h-6 rounded-full bg-amber-600 border-2 ${themeColor === '#d97706' ? 'border-gray-800 dark:border-white' : 'border-transparent'}`}></button>
                                </div>
                                <button onClick={() => setThemeMode(themeMode === 'light' ? 'dark' : 'light')} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                                    {themeMode === 'light' ? <Icon name="Moon" size={20} /> : <Icon name="Sun" size={20} />}
                                </button>
                            </div>
                        </header>

                        {}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 print:p-0 print:m-0 print:overflow-visible relative style-scrollbar bg-slate-100 dark:bg-gray-900">
                            {activeTab === 'dashboard' && <DashboardPanel user={currentUser} stats={{ penduduk: penduduk.length, surat: 142, dokumen: dokumen.length }} />}
                            {activeTab === 'penduduk' && <PendudukPanel penduduk={penduduk} setPenduduk={setPenduduk} showToast={showToast} />}
                            {activeTab === 'dokumen' && <DokumenPanel dokumen={dokumen} setDokumen={setDokumen} setDocumentToEdit={setDocumentToEdit} setActiveTab={setActiveTab} />}
                            
                            {/* Upgraded Workspaces for Kades, Sekdes, and other officials */}
                            {activeTab === 'kades' && <WorkspaceDocsModule category="KADES" icon="Briefcase" docs={workspaceDocs} setDocs={setWorkspaceDocs} files={uploadedFiles} setFiles={setUploadedFiles} description="Arsip, disposisi, dan pembuatan dokumen kerja Kepala Desa." showToast={showToast} />}
                            {activeTab === 'sekdes' && <WorkspaceDocsModule category="SEKDES" icon="Clipboard" docs={workspaceDocs} setDocs={setWorkspaceDocs} files={uploadedFiles} setFiles={setUploadedFiles} description="Arsip administrasi umum dan penyusunan laporan Sekretaris Desa." showToast={showToast} />}
                            {activeTab === 'kesejahteraan' && <WorkspaceDocsModule category="KASI KESEJAHTERAAN" icon="Heart" docs={workspaceDocs} setDocs={setWorkspaceDocs} files={uploadedFiles} setFiles={setUploadedFiles} description="Arsip pelayanan sosial dan kesejahteraan masyarakat." showToast={showToast} />}
                            {activeTab === 'perencanaan' && <WorkspaceDocsModule category="KAUR PERENCANAAN" icon="TrendingUp" docs={workspaceDocs} setDocs={setWorkspaceDocs} files={uploadedFiles} setFiles={setUploadedFiles} description="Pembuatan dokumen perencanaan strategis desa, RAB, dan RKP." showToast={showToast} />}

        function DynamicTable({ title, colorTheme, data, setData, defaultObj }) {
            const addRow = () => setData([...data, { ...defaultObj }]);
            const updateRow = (index, field, value) => {
                const newData = [...data]; newData[index][field] = value; setData(newData);
            };
            const removeRow = (index) => setData(data.filter((_, i) => i !== index));

            return (
                <div className={`mt-4 bg-white dark:bg-gray-800 p-4 rounded-xl border border-${colorTheme}-200 dark:border-gray-600 shadow-sm overflow-x-auto font-sans`}>
                    <div className="flex justify-between items-center mb-4">
                        <h4 className="font-bold">{title}</h4>
                        <button onClick={addRow} className={`px-3 py-1 bg-${colorTheme}-500 text-white rounded text-sm hover:opacity-90 flex items-center`}><Icon name="Plus" size={12} className="mr-1" /> Tambah Baris</button>
                    </div>
                    <table className="w-full text-sm border-collapse min-w-[600px]">
                        <thead>
                            <tr className="bg-gray-100 dark:bg-gray-700">
                                {Object.keys(defaultObj).map(k => <th key={k} className="p-2 border dark:border-gray-600 capitalize text-left">{k.replace(/_/g, ' ')}</th>)}
                                <th className="p-2 border dark:border-gray-600 w-16 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            {data.map((row, i) => (
                                <tr key={i}>
                                    {Object.keys(defaultObj).map(k => (
                                        <td key={k} className="p-1 border dark:border-gray-600">
                                            <input type="text" className="w-full p-1.5 bg-transparent outline-none border-b border-transparent focus:border-gray-400 dark:focus:border-gray-500" value={row[k]} onChange={(e) => updateRow(i, k, e.target.value)} placeholder={`Input ${k}...`} />
                                        </td>
                                    ))}
                                    <td className="p-1 border dark:border-gray-600 text-center"><button onClick={() => removeRow(i)} className="text-red-500 hover:text-red-700 p-1"><Icon name="Trash2" /></button></td>
                                </tr>
                            ))}
                            {data.length === 0 && <tr><td colSpan={Object.keys(defaultObj).length + 1} className="p-4 text-center text-gray-400">Tidak ada data. Klik Tambah Baris.</td></tr>}
                        </tbody>
                    </table>
                </div>
            );
        }

        function SuratPanel({ penduduk, setDokumen, documentToEdit, setDocumentToEdit, showToast }) {
            const generateNoSurat = () => `470 / ${String(Math.floor(Math.random() * 900) + 100).padStart(3, '0')} / ${new Date().getFullYear()}`;
            const [jenis, setJenis] = useState(JENIS_SURAT[0]);
            const [pejabat, setPejabat] = useState('KADES');
            const [showPreview, setShowPreview] = useState(false);
            
            // Comprehensive State including new fields for Surat Kuasa and Usaha Pertanian
            const [formData, setFormData] = useState({
                nomor_surat: generateNoSurat(), nama: '', nik: '', ttl: '', jk: 'Laki-laki', agama: '', pekerjaan: '', alamat: '', keperluan: '',
                keterangan_bebas: '', judul_kustom: '', keterangan_kustom: '',
                // Surat Kuasa Specific
                kuasa_p1_nama: '', kuasa_p1_nik: '', kuasa_p1_pekerjaan: '', kuasa_p1_alamat: '',
                kuasa_p2_nama: '', kuasa_p2_nik: '', kuasa_p2_pekerjaan: '', kuasa_p2_alamat: '',
                kuasa_perihal: '',
                // Pertanian Specific
                tani_luas_tanam: '', tani_luas_tanah: '', tani_luas_garapan: '', tani_lokasi: '', tani_lama_usaha: ''
            });

            const handleCariPenduduk = (e) => {
                const nik = e.target.value; setFormData({...formData, nik: nik});
                const p = penduduk.find(x => x.nik === nik);
                if(p) setFormData(prev => ({ ...prev, nama: p.nama, ttl: p.ttl, jk: p.jk, alamat: p.alamat, agama: p.agama, pekerjaan: p.pekerjaan }));
            };

            const today = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            
            useEffect(() => {
                if (documentToEdit && documentToEdit.category === 'umum') {
                    setJenis(documentToEdit.jenis_form); setPejabat(documentToEdit.pejabat);
                    if (documentToEdit.formData) setFormData(documentToEdit.formData);
                    setShowPreview(true);
                } else {
                    setFormData({ 
                        nomor_surat: generateNoSurat(), nama: '', nik: '', ttl: '', jk: 'Laki-laki', agama: '', pekerjaan: '', alamat: '', keperluan: '', 
                        keterangan_bebas: '', judul_kustom: '', keterangan_kustom: '',
                        kuasa_p1_nama: '', kuasa_p1_nik: '', kuasa_p1_pekerjaan: '', kuasa_p1_alamat: '',
                        kuasa_p2_nama: '', kuasa_p2_nik: '', kuasa_p2_pekerjaan: '', kuasa_p2_alamat: '',
                        kuasa_perihal: '',
                        tani_luas_tanam: '', tani_luas_tanah: '', tani_luas_garapan: '', tani_lokasi: '', tani_lama_usaha: ''
                    });
                    setShowPreview(false);
                }
            }, [documentToEdit, jenis]);

            const handleSimpanDokumen = () => {
                const docTitle = jenis === "Surat Keterangan ( Custom )" ? formData.judul_kustom : jenis;
                const isEdit = documentToEdit && documentToEdit.id;
                const newDoc = {
                    id: isEdit ? documentToEdit.id : Date.now(), tanggal: today, nomor: formData.nomor_surat,
                    jenis: docTitle || 'Surat Keterangan', pemohon: formData.nama || formData.kuasa_p1_nama || 'Tidak diketahui', keterangan: formData.keterangan_bebas || '-',
                    jenis_form: jenis, pejabat: pejabat, category: 'umum', formData: formData
                };
                if (isEdit) { 
                    setDokumen(prev => prev.map(d => d.id === documentToEdit.id ? newDoc : d)); 
                    showToast("Arsip surat diperbarui!"); 
                } else { 
                    setDokumen(prev => [newDoc, ...prev]); 
                    showToast("Surat berhasil diarsipkan!"); 
                }
            };

            // Word Export Function for General Certificates
            const exportToWord = () => {
                const element = document.getElementById('printable-area');
                if (!element) return;
                const htmlContent = `
                    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <title>${jenis}</title>
                        <style>
                            body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; color: #000; }
                            table { width: 100%; border-collapse: collapse; }
                            td { padding: 4px; }
                        </style>
                    </head>
                    <body>
                        ${element.innerHTML}
                    </body>
                    </html>
                `;
                const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${jenis.replace(/\s+/g, '_')}_${formData.nomor_surat.replace(/\//g, '-')}.doc`;

                    htmlTable += `
                        <tr><td><strong>Nama Pemberi Kuasa (P1)</strong></td><td colspan="2">${formData.kuasa_p1_nama}</td></tr>
                        <tr><td><strong>NIK Pemberi Kuasa</strong></td><td colspan="2">${formData.kuasa_p1_nik}</td></tr>
                        <tr><td><strong>Nama Penerima Kuasa (P2)</strong></td><td colspan="2">${formData.kuasa_p2_nama}</td></tr>

                    `;

                    htmlTable += `
                        <tr><td><strong>Nama Petani / Pemohon</strong></td><td colspan="2">${formData.nama}</td></tr>
                        <tr><td><strong>NIK</strong></td><td colspan="2">${formData.nik}</td></tr>
                        <tr><td><strong>Luas Tanam</strong></td><td colspan="2">${formData.tani_luas_tanam}</td></tr>
                        <tr><td><strong>Luas Tanah</strong></td><td colspan="2">${formData.tani_luas_tanah}</td></tr>
                        <tr><td><strong>Luas Garapan</strong></td><td colspan="2">${formData.tani_luas_garapan}</td></tr>
                        <tr><td><strong>Lokasi Lahan</strong></td><td colspan="2">${formData.tani_lokasi}</td></tr>
                        <tr><td><strong>Lama Usaha</strong></td><td colspan="2">${formData.tani_lama_usaha}</td></tr>
                    `;
                } else {
                    htmlTable += `
                        <tr><td><strong>Nama Pemohon</strong></td><td colspan="2">${formData.nama}</td></tr>
                        <tr><td><strong>NIK</strong></td><td colspan="2">${formData.nik}</td></tr>
                        <tr><td><strong>Tempat, Tgl Lahir</strong></td><td colspan="2">${formData.ttl}</td></tr>
                        <tr><td><strong>Jenis Kelamin</strong></td><td colspan="2">${formData.jk}</td></tr>
                        <tr><td><strong>Agama</strong></td><td colspan="2">${formData.agama}</td></tr>
                        <tr><td><strong>Pekerjaan</strong></td><td colspan="2">${formData.pekerjaan}</td></tr>
                        <tr><td><strong>Alamat Domisili</strong></td><td colspan="2">${formData.alamat}</td></tr>
                        <tr><td><strong>Keperluan</strong></td><td colspan="2">${formData.keperluan}</td></tr>
                    `;
                }

                if (formData.keterangan_bebas) {
                    htmlTable += `<tr><td><strong>Catatan Bebas</strong></td><td colspan="2" style="font-style: italic;">${formData.keterangan_bebas}</td></tr>`;
                }

                htmlTable += `</table></body></html>`;

                const blob = new Blob(['\ufeff' + htmlTable], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${jenis.replace(/\s+/g, '_')}_${formData.nomor_surat.replace(/\//g, '-')}.xls`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast("Mengekspor data ke MS Excel...");

            return (

                                    {/* Handle Custom Letter */}

                                        <div>
                                            <div className="my-4 whitespace-pre-wrap">{formData.keterangan_kustom || 'Tuliskan isi surat secara manual di sini...'}</div>
                                        </div>
                                    )}

                                    {/* Handle Surat Kuasa Specific Layout */}
                                    {jenis === "Surat Kuasa" && (
                                        <div>
                                            <p className="mb-4">Yang bertandatangan di bawah ini disebut sebagai <strong>Pihak Ke-1 (Pemberi Kuasa)</strong>:</p>
                                            <table className="w-full mb-6 ml-6">
                                                <tbody>
                                                    <tr><td className="w-48 py-1">Nama Lengkap</td><td className="w-4">:</td><td className="font-bold uppercase">{formData.kuasa_p1_nama || '......................................'}</td></tr>
                                                    <tr><td className="py-1">NIK</td><td>:</td><td>{formData.kuasa_p1_nik || '......................................'}</td></tr>
                                                    <tr><td className="py-1">Pekerjaan</td><td>:</td><td>{formData.kuasa_p1_pekerjaan || '......................................'}</td></tr>
                                                    <tr><td className="py-1">Alamat</td><td>:</td><td>{formData.kuasa_p1_alamat || '......................................'}</td></tr>
                                                </tbody>
                                            </table>

                                            <p className="mb-4">Memberikan kuasa sepenuhnya kepada <strong>Pihak Ke-2 (Penerima Kuasa)</strong>:</p>
                                            <table className="w-full mb-6 ml-6">
                                                <tbody>
                                                    <tr><td className="w-48 py-1">Nama Lengkap</td><td className="w-4">:</td><td className="font-bold uppercase">{formData.kuasa_p2_nama || '......................................'}</td></tr>

                                                    <tr><td className="py-1">Pekerjaan</td><td>:</td><td>{formData.kuasa_p2_pekerjaan || '......................................'}</td></tr>
                                                    <tr><td className="py-1">Alamat</td><td>:</td><td>{formData.kuasa_p2_alamat || '......................................'}</td></tr>
                                                </tbody>
                                            </table>

            const hapusDokumen = (id) => setDokumen(dokumen.filter(d => d.id !== id));
            return (
                <div className="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 animate-fade-in text-gray-950 dark:text-white font-sans">
                    <h2 className="text-2xl font-bold mb-6 flex items-center">
                        <Icon name="FolderOpen" size={24} className="mr-3 text-[var(--theme-color)]" /> Arsip Dokumen Terbit
                    </h2>
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left border-collapse">
                            <thead className="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200">
                                <tr>
                                    <th className="p-4 rounded-tl-lg">Tanggal</th>
                                    <th className="p-4">Nomor Surat</th>
                                    <th className="p-4">Jenis Dokumen</th>
                                    <th className="p-4">Atas Nama</th>
                                    <th className="p-4 rounded-tr-lg text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                {dokumen.map(d => (
                                    <tr key={d.id} className="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition">
                                        <td className="p-4">{d.tanggal}</td>
                                        <td className="p-4 font-mono text-xs">{d.nomor}</td>
                                        <td className="p-4 font-bold text-[var(--theme-color)]">{d.jenis}</td>
                                        <td className="p-4 uppercase">{d.pemohon}</td>
                                        <td className="p-4 flex gap-2 justify-center font-sans">
                                            <button 
                                                onClick={() => { setDocumentToEdit(d); setActiveTab(d.category === 'pertanahan' ? 'pemerintahan' : 'pelayanan'); }} 
                                                className="px-3 py-1 bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded hover:bg-blue-200 transition"
                                            >
                                                Lihat
                                            </button>
                                            <button 
                                                onClick={() => hapusDokumen(d.id)} 
                                                className="px-3 py-1 bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 rounded hover:bg-red-200 transition"
                                            >
                                                Hapus
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                                {dokumen.length === 0 && (
                                    <tr>
                                        <td colSpan="5" className="p-8 text-center text-gray-500">Belum ada dokumen yang diarsipkan.</td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function WorkspaceDocsModule({ category, icon, docs, setDocs, files, setFiles, description, showToast }) {
            const [viewMode, setViewMode] = useState('list'); // 'list', 'create', 'edit', 'preview'
            const [activeDoc, setActiveDoc] = useState(null);
            const [docForm, setDocForm] = useState({ title: '', content: '' });

            const handleNewDoc = () => {
                setDocForm({ title: '', content: '' });
                setViewMode('create');
            };

            const handleSaveDoc = () => {
                if (!docForm.title || !docForm.content) {
                    showToast("Judul dan isi dokumen tidak boleh kosong!");
                    return;
                }
                const isEditing = activeDoc !== null;
                if (isEditing) {
                    setDocs(prev => prev.map(d => d.id === activeDoc.id ? { ...d, title: docForm.title, content: docForm.content } : d));
                    showToast("Dokumen berhasil diperbarui!");
                } else {
                    const newDoc = {
                        id: Date.now(),
                        role: category,
                        title: docForm.title,
                        content: docForm.content,
                        date: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })
                    };
                    setDocs(prev => [...prev, newDoc]);
                    showToast("Dokumen baru berhasil dibuat!");
                }
                setViewMode('list');
                setActiveDoc(null);
            };

            const handleEditDoc = (doc) => {
                setActiveDoc(doc);
                setDocForm({ title: doc.title, content: doc.content });
                setViewMode('edit');
            };

            const handlePreviewDoc = (doc) => {
                setActiveDoc(doc);
                setViewMode('preview');
            };

            const handleDeleteDoc = (id) => {
                setDocs(prev => prev.filter(d => d.id !== id));
                showToast("Dokumen berhasil dihapus!");
            };

            const exportToWord = (doc) => {
                const htmlContent = `
                    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <title>${doc.title}</title>
                        <style>
                            body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
                            h1 { text-align: center; font-size: 20pt; font-weight: bold; margin-bottom: 25px; }
                            p { font-size: 11pt; text-align: justify; margin-bottom: 12px; }
                            .meta { font-size: 10pt; color: #555; text-align: right; margin-bottom: 30px; }
                        </style>
                    </head>
                    <body>
                        <div class="meta">Ruang Kerja: ${doc.role} | Tanggal: ${doc.date}</div>
                        <h1>${doc.title}</h1>
                        <div style="white-space: pre-wrap;">${doc.content.replace(/\n/g, '<br/>')}</div>
                    </body>
                    </html>
                `;
                const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${doc.title.replace(/\s+/g, '_')}.doc`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast("Berhasil mengekspor ke MS Word!");
            };

            const exportToExcel = (doc) => {
                const htmlContent = `
                    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <meta charset="UTF-8">
                        <style>
                            th { background-color: #4F81BD; color: #FFFFFF; font-family: Arial; font-size: 12pt; font-weight: bold; border: 0.5pt solid #000; }
                            td { font-family: Arial; font-size: 10pt; border: 0.5pt solid #000; vertical-align: top; }
                        </style>
                    </head>
                    <body>
                        <table>
                            <tr><th colspan="3" style="font-size: 14pt; height: 40px; background-color: #2F4F4F;">ARSIP DOKUMEN DESA - ${doc.role}</th></tr>
                            <tr><td><strong>Judul Dokumen</strong></td><td colspan="2">${doc.title}</td></tr>
                            <tr><td><strong>Tanggal Dibuat</strong></td><td colspan="2">${doc.date}</td></tr>
                            <tr><td><strong>Perangkat</strong></td><td colspan="2">${doc.role}</td></tr>
                            <tr><td colspan="3" style="background-color: #F2F2F2; font-weight: bold; text-align: center;">ISI DOKUMEN / NOTA DINAS</td></tr>
                            ${doc.content.split('\n').map((line, idx) => `
                                <tr>
                                    <td style="text-align: center;">Baris ${idx+1}</td>
                                    <td colspan="2">${line}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </body>
                    </html>
                `;
                const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${doc.title.replace(/\s+/g, '_')}.xls`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast("Berhasil mengekspor ke MS Excel!");
            };

            const printDocument = () => {
                window.print();
            };

            const roleDocs = docs.filter(d => d.role === category);

            return (
                <div className="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 animate-fade-in text-gray-950 dark:text-white font-sans">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-4 mb-6 dark:border-gray-700 gap-4">
                        <div>
                            <h2 className="text-2xl font-bold flex items-center">
                                <Icon name={icon} size={24} className="mr-3 text-[var(--theme-color)]" /> Ruang Kerja Perangkat : {category}
                            </h2>
                            <p className="text-xs text-gray-500 dark:text-gray-400 mt-1">{description}</p>
                        </div>
                        {viewMode === 'list' && (
                            <button onClick={handleNewDoc} className="px-5 py-2.5 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow transition flex items-center">
                                <Icon name="Plus" size={16} className="mr-2" /> Buat Dokumen Baru
                            </button>
                        )}
                    </div>

                    {/* LIST VIEW */}
                    {viewMode === 'list' && (
                        <div className="space-y-6">
                            <div>
                                <h3 className="text-lg font-bold mb-4 flex items-center text-gray-800 dark:text-white">
                                    <Icon name="FileText" size={18} className="mr-2 text-indigo-500" /> Dokumen Kerja ({roleDocs.length})
                                </h3>
                                {roleDocs.length === 0 ? (
                                    <div className="p-8 text-center text-gray-400 bg-gray-50 dark:bg-gray-700/20 rounded-xl border border-dashed">
                                        Belum ada dokumen kerja. Silakan klik "Buat Dokumen Baru" di atas.
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {roleDocs.map(doc => (
                                            <div key={doc.id} className="p-5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/30 flex flex-col justify-between hover:shadow-md transition">
                                                <div>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-xs text-gray-400 font-mono font-bold flex items-center">
                                                            <Icon name="Calendar" size={12} className="mr-1" /> {doc.date}
                                                        </span>
                                                        <span className="text-xs px-2 py-0.5 bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 rounded font-bold">{doc.role}</span>
                                                    </div>
                                                    <h4 className="font-bold text-lg mb-2 text-gray-900 dark:text-white line-clamp-1">{doc.title}</h4>
                                                    <p className="text-sm text-gray-500 line-clamp-3 mb-4 whitespace-pre-line">{doc.content}</p>
                                                </div>
                                                <div className="flex flex-wrap gap-2 pt-4 border-t dark:border-gray-700 font-sans">
                                                    <button onClick={() => handlePreviewDoc(doc)} className="px-3 py-1.5 bg-blue-500 text-white text-xs font-bold rounded hover:opacity-90 flex items-center">
                                                        <Icon name="Eye" size={12} className="mr-1" /> Preview
                                                    </button>
                                                    <button onClick={() => handleEditDoc(doc)} className="px-3 py-1.5 bg-yellow-500 text-white text-xs font-bold rounded hover:opacity-90 flex items-center">
                                                        <Icon name="Edit" size={12} className="mr-1" /> Edit
                                                    </button>
                                                    <button onClick={() => exportToWord(doc)} className="px-3 py-1.5 bg-blue-600 text-white text-xs font-bold rounded hover:opacity-90 flex items-center">
                                                        <Icon name="FileWord" size={12} className="mr-1" /> Word
                                                    </button>
                                                    <button onClick={() => exportToExcel(doc)} className="px-3 py-1.5 bg-green-600 text-white text-xs font-bold rounded hover:opacity-90 flex items-center">
                                                        <Icon name="FileExcel" size={12} className="mr-1" /> Excel
                                                    </button>
                                                    <button onClick={() => handleDeleteDoc(doc.id)} className="px-3 py-1.5 bg-red-600 text-white text-xs font-bold rounded hover:opacity-90 ml-auto flex items-center" title="Hapus Dokumen">
                                                        <Icon name="Trash2" size={12} />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div className="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700">
                                <h3 className="text-lg font-bold mb-4 flex items-center text-gray-800 dark:text-white">
                                    <Icon name="Upload" size={18} className="mr-2 text-emerald-500" /> Arsip Digital File Fisik (Scan)
                                </h3>
                                <UploadSection category={category} files={files} setFiles={setFiles} showToast={showToast} />
                            </div>
                        </div>
                    )}

                    {/* CREATE & EDIT VIEW */}
                    {(viewMode === 'create' || viewMode === 'edit') && (
                        <div className="space-y-4 animate-fade-in max-w-4xl mx-auto bg-gray-50 dark:bg-gray-700/20 p-6 rounded-xl border border-gray-200 dark:border-gray-700 font-sans">
                            <h3 className="text-xl font-bold border-b pb-2 mb-4">
                                {viewMode === 'create' ? 'Buat Dokumen Baru' : 'Edit Dokumen'}
                            </h3>
                            <Input 
                                label="Judul Dokumen" 
                                value={docForm.title} 
                                onChange={e => setDocForm({...docForm, title: e.target.value})} 
                                placeholder="Ketikkan judul resmi dokumen..." 
                            />
                            <Textarea 
                                label="Isi Dokumen" 
                                value={docForm.content} 
                                onChange={e => setDocForm({...docForm, content: e.target.value})} 
                                placeholder="Tuliskan seluruh isi draf dokumen atau surat di sini secara lengkap..." 
                                rows={12} 
                            />
                            <div className="flex justify-end gap-3 pt-4">
                                <button onClick={() => { setViewMode('list'); setActiveDoc(null); }} className="px-5 py-2 bg-gray-400 hover:bg-gray-500 text-white font-bold rounded-xl transition">
                                    Batal
                                </button>
                                <button onClick={handleSaveDoc} className="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow transition flex items-center">
                                    <Icon name="Save" size={16} className="mr-2" /> Simpan Dokumen
                                </button>
                            </div>
                        </div>
                    )}

                    {/* PREVIEW VIEW */}
                    {viewMode === 'preview' && activeDoc && (
                        <div className="space-y-4 animate-fade-in max-w-4xl mx-auto font-sans">
                            <div className="flex flex-wrap gap-3 justify-between items-center bg-gray-100 dark:bg-gray-700 p-4 rounded-xl border print-hide">
                                <button onClick={() => setViewMode('list')} className="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white text-sm font-bold rounded-lg flex items-center transition">
                                    <Icon name="X" size={16} className="mr-2" /> Tutup Preview
                                </button>
                                <div className="flex gap-2 font-sans">
                                    <button onClick={() => exportToWord(activeDoc)} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-lg flex items-center transition">
                                        <Icon name="FileWord" size={16} className="mr-2" /> Export Word
                                    </button>
                                    <button onClick={() => exportToExcel(activeDoc)} className="px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-lg flex items-center transition">
                                        <Icon name="FileExcel" size={16} className="mr-2" /> Export Excel
                                    </button>
                                    <button onClick={printDocument} className="px-4 py-2 text-white text-sm font-bold rounded-lg flex items-center transition transform hover:scale-105" style={{ backgroundColor: 'var(--theme-color)' }}>
                                        <Icon name="Printer" size={16} className="mr-2" /> Cetak / PDF
                                    </button>
                                </div>
                            </div>

                            {/* DOCUMENT SHEET FOR PREVIEW AND PRINT (STRICT ARIAL) */}
                            <div id="printable-area" className="bg-white text-black p-12 shadow-2xl border min-h-[297mm] rounded-lg" style={{ fontFamily: 'Arial, Helvetica, sans-serif' }}>
                                <KopSurat />
                                <div className="mt-8 text-right text-xs font-bold text-gray-500">
                                    Format Dokumen: {activeDoc.role} | Tanggal Terbit: {activeDoc.date}
                                </div>
                                <div className="text-center my-8">
                                    <h2 className="text-2xl font-black uppercase underline tracking-wider">{activeDoc.title}</h2>
                                    <p className="text-xs text-gray-600 mt-1">Sistem Dokumen Terintegrasi DigiDes Keboledan</p>
                                </div>
                                <div className="text-justify leading-relaxed whitespace-pre-wrap text-base my-8 px-6">
                                    {activeDoc.content}
                                </div>
                                <TandaTangan today={activeDoc.date} pejabat={activeDoc.role === 'KADES' ? 'KADES' : 'SEKDES'} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function UploadSection({ category, files, setFiles, showToast }) {
            const handleUpload = (e) => {
                if (e.target.files.length === 0) return;
                const newFiles = Array.from(e.target.files).map(f => ({ 
                    name: f.name, 
                    date: new Date().toLocaleDateString('id-ID'), 
                    category: category, 
                    size: (f.size / 1024).toFixed(2) + ' KB' 
                }));
                setFiles([...files, ...newFiles]);
                showToast(`Berhasil mengunggah ${newFiles.length} file.`);
            };
            
            const catFiles = files.filter(f => f.category === category);
            
            return (
                <div className="font-sans">
                    <div className="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-10 text-center hover:bg-gray-50 dark:hover:bg-gray-700/50 transition relative group">
                        <input type="file" multiple onChange={handleUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" title="Upload files" />
                        <Icon name="Upload" size={48} className="text-gray-400 mb-4 mx-auto group-hover:text-[var(--theme-color)] transition-colors" />
                        <p className="font-bold text-gray-700 dark:text-gray-300 mb-1">Klik atau seret file ke sini untuk mengunggah arsip fisik</p>
                        <p className="text-sm text-gray-500">Mendukung format PDF, Word, Excel, JPG, PNG.</p>
                    </div>
                    
                    {catFiles.length > 0 && (
                        <div className="mt-8">
                            <h4 className="font-bold mb-4 text-lg border-b dark:border-gray-700 pb-2">File Terunggah ({catFiles.length})</h4>
                            <ul className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {catFiles.map((f, i) => (
                                    <li key={i} className="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700/50 rounded-xl border border-gray-100 dark:border-gray-600">
                                        <div className="flex items-center overflow-hidden">
                                            <Icon name="FileIcon" size={24} className="text-[var(--theme-color)] mr-3 flex-shrink-0" />
                                            <div className="overflow-hidden">
                                                <p className="font-semibold truncate text-sm">{f.name}</p>
                                                <p className="text-xs text-gray-500">{f.date} • {f.size}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => { setFiles(files.filter(file => file !== f)); showToast("File dihapus."); }}
                                            className="text-gray-400 hover:text-red-500 p-2"
                                        >
                                            <Icon name="Trash2" />
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
